# ─── Identificación del experimento ───────────────────────────────────────────
RUN_NAME: "transformer_baseline"

# ─── Rutas ────────────────────────────────────────────────────────────────────
RAW_PATH: "./data/datasets/ABIDE_pcp/cpac/filt_noglobal/rois_cc200"
INTERP_PATH: "./data/datasets/ABIDE_pcp/cpac/filt_noglobal/rois_cc200_interp"
CSV_PATH: "./data/csv/data_train.csv"
LOGS_PATH: "./logs/"
# ─── Dataset ──────────────────────────────────────────────────────────────────
ATLAS: "cc200"
N_ROIS: 200
TR: 2.0
PREFIX: "interp_"
MIN_TIMESTEPS: 116
WINDOW_SIZE: 128
LABEL_COL: "DX_GROUP"
FACTORS:
  - "AGE_AT_SCAN"
  - "SEX"
  - "EYE_STATUS_AT_SCAN"
SEED: 42

# ─── DataLoader ───────────────────────────────────────────────────────────────
BATCH_SIZE: 64
NUM_WORKERS: 8

# ─── Arquitectura (Transformer + MLP) ─────────────────────────────────────────
D_MODEL: 256
DIM_FEEDFORWARD: 512
NUM_ENCODER_LAYERS: 2
N_HEADS: 4
ENC_DROP: 0.5
CLS_DROPOUT: 0.1

# ─── Entrenamiento ────────────────────────────────────────────────────────────
N_EPOCHS: 2000
N_SPLITS_CV: 5
LR: 1e-4
WEIGHT_DECAY: 0.1
LABEL_SMOOTHING: 0.1

# ─── Callbacks ────────────────────────────────────────────────────────────────
PATIENCE: 30
MIN_DELTA: 0.001