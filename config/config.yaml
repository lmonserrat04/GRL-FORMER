# ─── Identificación del experimento ───────────────────────────────────────────
RUN_NAME: "transformer_baseline"

# ─── Rutas ────────────────────────────────────────────────────────────────────
RAW_PATH: "./data/datasets/ABIDE_pcp/cpac/filt_noglobal/rois_cc200"
INTERP_PATH: "./data/datasets/ABIDE_pcp/cpac/filt_noglobal/rois_cc200_interp"
CSV_PATH: "./data/csv/data_train.csv"
LOGS_PATH: "./logs/"
# ─── Dataset ──────────────────────────────────────────────────────────────────
ATLAS: "cc200"
N_ROIS: 200
TR: 2.0
PREFIX: "interp_"
MIN_TIMESTEPS: 116
WINDOW_SIZE: 128
LABEL_COL: "DX_GROUP"
FACTORS:
  - "AGE_AT_SCAN"
  - "SEX"
  - "EYE_STATUS_AT_SCAN"
SEED: 42
MAX_SEQ_LEN : 200
PCC_DIM : 19900
# ─── DataLoader ───────────────────────────────────────────────────────────────
BATCH_SIZE: 64
NUM_WORKERS: 8

# ─── Arquitectura (Transformer + MLP) ─────────────────────────────────────────
TST1:
  D_MODEL: 256
  DIM_FEEDFORWARD: 512
  NUM_ENCODER_LAYERS: 2
  N_HEADS: 4
  ENC_DROP: 0.5
  USE_CLS_TOKEN: True
TST2:
  D_MODEL : 256
  N_HEADS : 8
  NUM_ENCODER_LAYERS: 2
  DIM_FEEDFORWARD: 512
  ENC_DROP: 0.1

DUAL_STREAM:
  FUSION_TYPE: 'attention_pooling'
  NUM_CLASSES : 2
  CLASSIFIER_DROPOUT : 0.1
FUSION:
  ATTENTION_POOLING:
    HIDDEN_DIM : 512


# ─── Preentrenamiento  ────────────────────────────────────────────────────────────
N_EPOCHS: 2000
N_SPLITS_CV: 5
LR: 1e-4
WEIGHT_DECAY: 0.1
LABEL_SMOOTHING: 0.1

# ─── Callbacks ────────────────────────────────────────────────────────────────
PATIENCE: 30
MIN_DELTA: 0.001