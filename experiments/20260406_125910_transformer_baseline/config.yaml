# ─── Identificación del experimento ───────────────────────────────────────────
RUN_NAME: "transformer_baseline"

# ─── Rutas ────────────────────────────────────────────────────────────────────
RAW_PATH:    "./data/datasets/ABIDE_pcp/cpac/filt_noglobal/cc200"
INTERP_PATH: "./data/datasets/ABIDE_pcp/cpac/cc200_interp"
CSV_PATH:    "./data/csv/data_train.csv"
LOGS_PATH:   "./logs/"

# ─── Dataset ──────────────────────────────────────────────────────────────────
ATLAS:         "cc200"
N_ROIS:        200
MIN_TIMESTEPS: 116
WINDOW_SIZE:   128
LABEL_COL:     "DX_GROUP"
SEED:          42

# ─── DataLoader ───────────────────────────────────────────────────────────────
BATCH_SIZE:   64
SHUFFLE:      true
NUM_WORKERS:  8

# ─── Arquitectura (Transformer + MLP) ─────────────────────────────────────────
D_MODEL:            256
DIM_FEEDFORWARD:    128
NUM_ENCODER_LAYERS: 4
N_HEADS:            4
ENC_DROP:           0.1
CLS_DROPOUT:        0.1

# ─── Entrenamiento ────────────────────────────────────────────────────────────
N_EPOCHS:       500
N_SPLITS_CV:    5
LR:             1e-4
WEIGHT_DECAY:   1e-2
LABEL_SMOOTHING: 0.1

# ─── Callbacks ────────────────────────────────────────────────────────────────
PATIENCE:  40
MIN_DELTA: 0.01